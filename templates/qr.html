<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QR Code</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: Arial, sans-serif;
            background: #3b3b3b;
            padding: 10px;
        }
        
        .container {
            max-width: 600px;
            margin: 0 auto;
            background: white;
            padding: 15px;
        }
        
        .qr-section {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            gap: 0;
            margin-bottom: 15px;
        }
        
        .qr-image {
            padding: 10px;
            border: 1px solid #ddd;
            display: inline-block;
            line-height: 0;
        }
        
        .qr-image img {
            display: block;
            width: 250px;
            height: 250px;
        }
        
        .text-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 272px;
        }
        
        .text-label {
            font-weight: bold;
            margin-top: 8px;
            margin-bottom: 3px;
            font-size: 13px;
            text-align: center;
            width: 100%;
        }
        
        .text-content {
            background: #fafafa;
            padding: 6px 10px;
            border: 1px solid #ddd;
            overflow-y: auto;
            max-height: 250px;
            font-size: 12px;
            line-height: 1.5;
            word-wrap: break-word;
            text-align: center;
            width: 100%;
            box-sizing: border-box;
        }
        
        .buttons {
            display: flex;
            gap: 8px;
        }
        
        .btn {
            padding: 8px 15px;
            border: 1px solid #999;
            background: white;
            cursor: pointer;
            font-size: 12px;
        }
        
        .btn:hover {
            background: #f0f0f0;
        }
        
        .btn-primary {
            background: #0066cc;
            color: white;
            border-color: #0066cc;
        }
        
        .btn-primary:hover {
            background: #0052a3;
        }
        
        .feedback {
            display: none;
            font-size: 11px;
            color: green;
            margin-top: 5px;
        }
        
        @media print {
            body {
                background: white;
                padding: 0;
            }
            
            .container {
                max-width: 100%;
                margin: 0;
                padding: 0;
            }

            .qr-section {
                display: flex;
                flex-direction: column;
                align-items: flex-start;
                gap: 0;
                margin-bottom: 0;
            }
            
            .qr-image {
                border: none;
                padding: 0;
                line-height: 0;
            }

            .qr-image img {
                width: 250px;
                height: 250px;
            }

            .text-section {
                width: 250px;
            }
            
            .text-label {
                font-weight: bold;
                margin-top: 6px;
                margin-bottom: 3px;
                font-size: 12px;
                text-align: center;
            }
            
            .text-content {
                border: none;
                background: white;
                padding: 0;
                max-height: none;
                font-size: 11px;
                text-align: center;
            }
            
            .buttons, .feedback {
                display: none;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="qr-section">
            <div class="qr-image">
                <img src="{{ url_for('get_qr_image', qr_id=qr_id) }}" alt="QR Code">
            </div>
            
            <div class="text-section">
                <div class="text-label">Текст:</div>
                <div class="text-content">{{ text }}</div>
            </div>
        </div>
        
        <div class="buttons">
            <button class="btn btn-primary" onclick="window.print()">Печать</button>
            <button class="btn" onclick="copyText()">Копировать</button>
        </div>
        
        <div class="feedback" id="feedback">Скопировано!</div>
    </div>
    
    <script>
        function copyText() {
            const text = "{{ text }}";
            navigator.clipboard.writeText(text).then(() => {
                const fb = document.getElementById('feedback');
                fb.style.display = 'block';
                setTimeout(() => { fb.style.display = 'none'; }, 1500);
            });
        }
    </script>
</body>
</html>
