<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QR Code Viewer</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 40px;
            max-width: 600px;
            width: 100%;
            text-align: center;
        }
        
        h1 {
            color: #333;
            margin-bottom: 10px;
            font-size: 28px;
        }
        
        .subtitle {
            color: #666;
            margin-bottom: 30px;
            font-size: 14px;
        }
        
        .qr-image {
            margin: 30px 0;
            padding: 30px;
            background: #f8f9fa;
            border-radius: 15px;
            display: inline-block;
        }
        
        .qr-image img {
            max-width: 400px;
            width: 100%;
            height: auto;
            border-radius: 10px;
        }
        
        .text-section {
            margin-top: 30px;
            padding-top: 30px;
            border-top: 2px solid #f0f0f0;
        }
        
        .text-label {
            color: #666;
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .text-content {
            background: #f8f9fa;
            border-left: 4px solid #667eea;
            padding: 20px;
            border-radius: 10px;
            word-break: break-word;
            color: #333;
            font-size: 16px;
            line-height: 1.6;
            text-align: left;
            max-height: 200px;
            overflow-y: auto;
        }
        
        .buttons {
            display: flex;
            gap: 15px;
            margin-top: 30px;
            flex-wrap: wrap;
            justify-content: center;
        }
        
        .btn {
            padding: 12px 30px;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-block;
        }
        
        .btn-print {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        
        .btn-print:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(102, 126, 234, 0.4);
        }
        
        .btn-copy {
            background: #f0f0f0;
            color: #333;
            border: 2px solid #667eea;
        }
        
        .btn-copy:hover {
            background: #667eea;
            color: white;
        }
        
        .footer {
            margin-top: 30px;
            color: #999;
            font-size: 12px;
        }
        
        .copy-feedback {
            display: none;
            color: #27ae60;
            font-weight: 600;
            margin-top: 10px;
            animation: fadeInOut 2s ease-in-out;
        }
        
        @keyframes fadeInOut {
            0%, 100% { opacity: 0; }
            50% { opacity: 1; }
        }
        
        @media print {
            body {
                background: white;
            }
            
            .container {
                box-shadow: none;
                padding: 20px;
            }
            
            .buttons, .footer, .subtitle {
                display: none;
            }
            
            .text-label, .text-content {
                border: none;
                background: none;
                padding: 0;
                margin: 20px 0 0 0;
                text-align: center;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📱 QR Code</h1>
        <p class="subtitle">Сканируйте или используйте код ниже</p>
        
        <div class="qr-image">
            <img src="{{ url_for('get_qr_image', qr_id=qr_id) }}" alt="QR Code">
        </div>
        
        <div class="text-section">
            <div class="text-label">📝 Закодированный текст:</div>
            <div class="text-content">{{ text }}</div>
        </div>
        
        <div class="buttons">
            <button class="btn btn-print" onclick="window.print()">🖨️ Печать</button>
            <button class="btn btn-copy" onclick="copyToClipboard()">📋 Копировать текст</button>
        </div>
        
        <div class="copy-feedback" id="feedback">✅ Текст скопирован в буфер обмена!</div>
        
        <div class="footer">
            <p>Создано QR Code Bot | Made with ❤️</p>
        </div>
    </div>
    
    <script>
        function copyToClipboard() {
            const text = "{{ text }}";
            navigator.clipboard.writeText(text).then(() => {
                const feedback = document.getElementById('feedback');
                feedback.style.display = 'block';
                setTimeout(() => {
                    feedback.style.display = 'none';
                }, 2000);
            });
        }
    </script>
</body>
</html>
