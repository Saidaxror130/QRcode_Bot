<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QR Code</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: Arial, sans-serif;
            background: #3b3b3b;
            padding: 16px;
        }

        /* ── UI панель (не печатается) ── */
        .ui-panel {
            max-width: 560px;
            margin: 0 auto 20px;
            background: #fff;
            border: 1px solid #ddd;
            padding: 16px 20px;
        }

        .ui-panel h3 {
            font-size: 13px;
            font-weight: bold;
            color: #333;
            margin-bottom: 12px;
        }

        .layout {
            display: flex;
            gap: 24px;
            align-items: flex-start;
        }

        .btn-grid {
            display: grid;
            grid-template-columns: repeat(3, 44px);
            gap: 5px;
        }

        .zone-btn {
            width: 44px;
            height: 36px;
            border: 1px solid #ccc;
            background: #fff;
            font-size: 16px;
            font-weight: bold;
            color: #555;
            cursor: pointer;
            border-radius: 4px;
            transition: background 0.12s, color 0.12s, border-color 0.12s;
        }

        .zone-btn:hover {
            background: #f5f5f5;
            border-color: #999;
            color: #222;
        }

        .zone-btn.active {
            background: #1a6fc4;
            color: #fff;
            border-color: #1a6fc4;
        }

        .hint-text {
            margin-top: 6px;
            font-size: 11px;
            color: #888;
            text-align: center;
        }

        .preview-label {
            font-size: 11px;
            color: #888;
            margin-bottom: 5px;
        }

        .a4-preview {
            width: 148px;
            height: 210px;
            border: 1px solid #aaa;
            background: #fff;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            grid-template-rows: repeat(3, 1fr);
        }

        .a4-cell {
            border: 0.5px solid #e0e0e0;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.15s;
        }

        .a4-cell.active-cell { background: #ddeeff; }

        .qr-mini {
            width: 30px;
            height: 30px;
            background: #1a6fc4;
            opacity: 0.3;
            border-radius: 2px;
        }

        .btn-print {
            margin-top: 14px;
            padding: 7px 18px;
            border: 1px solid #999;
            background: #fff;
            font-size: 12px;
            cursor: pointer;
            border-radius: 4px;
        }

        .btn-print:hover { background: #f5f5f5; }

        /* ── Печатный лист ── */
        .print-sheet {
            width: 210mm;
            height: 297mm;
            background: #fff;
            margin: 0 auto;
            position: relative;
            display: none;
        }

        .print-zone {
            position: absolute;
            width: 33.333%;
            height: 33.333%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 4mm;
        }

        .zone-1  { top: 0;       left: 0; }
        .zone-2  { top: 0;       left: 33.333%; }
        .zone-3  { top: 0;       left: 66.666%; }
        .zone-4  { top: 33.333%; left: 0; }
        .zone-5  { top: 33.333%; left: 33.333%; }
        .zone-6  { top: 33.333%; left: 66.666%; }
        .zone-7  { top: 66.666%; left: 0; }
        .zone-8  { top: 66.666%; left: 33.333%; }
        .zone-9  { top: 66.666%; left: 66.666%; }

        .zone-qr-img {
            width: 55mm;
            height: 55mm;
            display: block;
            flex-shrink: 0;
        }

        .zone-text-value {
            margin-top: 2mm;
            width: 55mm;
            text-align: center;
            line-height: 1.3;
            word-break: break-word;
            overflow-wrap: break-word;
            /* начальный размер — JS перезапишет */
            font-size: 14pt;
        }

        @media print {
            body { background: white; padding: 0; }
            .ui-panel { display: none; }
            .print-sheet { display: block; }
        }
    </style>
</head>
<body>

<div class="ui-panel">
    <h3>Выберите позицию QR-кода на листе А4</h3>
    <div class="layout">
        <div>
            <div class="btn-grid" id="btnGrid"></div>
            <div class="hint-text" id="hintText">По центру</div>
            <button class="btn-print" onclick="window.print()">Печать</button>
        </div>
        <div>
            <div class="preview-label">Предварительный просмотр</div>
            <div class="a4-preview" id="a4Preview"></div>
        </div>
    </div>
</div>

<div class="print-sheet" id="printSheet">
    <div class="print-zone zone-1" id="pz1"></div>
    <div class="print-zone zone-2" id="pz2"></div>
    <div class="print-zone zone-3" id="pz3"></div>
    <div class="print-zone zone-4" id="pz4"></div>
    <div class="print-zone zone-5" id="pz5"></div>
    <div class="print-zone zone-6" id="pz6"></div>
    <div class="print-zone zone-7" id="pz7"></div>
    <div class="print-zone zone-8" id="pz8"></div>
    <div class="print-zone zone-9" id="pz9"></div>
</div>

<script>
    var QR_SRC  = "{{ url_for('get_qr_image', qr_id=qr_id) }}";
    var QR_TEXT = "{{ text }}";

    var zoneNames = [
        'Верхний левый',  'Верхний центр',  'Верхний правый',
        'Средний левый',  'По центру',       'Средний правый',
        'Нижний левый',   'Нижний центр',    'Нижний правый'
    ];

    var selected = 4;

    /* Превью А4 */
    var a4El = document.getElementById('a4Preview');
    var previewCells = [];
    for (var i = 0; i < 9; i++) {
        var c = document.createElement('div');
        c.className = 'a4-cell';
        a4El.appendChild(c);
        previewCells.push(c);
    }

    /* Кнопки */
    var btnGrid = document.getElementById('btnGrid');
    var buttons = [];
    for (var i = 0; i < 9; i++) {
        (function(idx) {
            var b = document.createElement('button');
            b.className = 'zone-btn' + (idx === 4 ? ' active' : '');
            b.textContent = idx + 1;
            b.onclick = function() { selectZone(idx); };
            btnGrid.appendChild(b);
            buttons.push(b);
        })(i);
    }

    function selectZone(idx) {
        selected = idx;
        buttons.forEach(function(b, i) { b.classList.toggle('active', i === idx); });
        previewCells.forEach(function(c, i) {
            c.classList.toggle('active-cell', i === idx);
            c.innerHTML = (i === idx) ? '<div class="qr-mini"></div>' : '';
        });
        document.getElementById('hintText').textContent = zoneNames[idx];
        updatePrintSheet();
    }

    /* Автоподбор размера шрифта:
       - стартуем с крупного (40px)
       - если текст шире контейнера — уменьшаем по 0.5px
       - минимум 7px; если даже он не вмещает — разрешаем перенос строк */
    function fitText(el) {
        var MAX = 40, MIN = 7;
        el.style.whiteSpace = 'nowrap';
        el.style.fontSize = MAX + 'px';

        var containerW = el.offsetWidth; /* = 55mm в px */
        var size = MAX;

        while (el.scrollWidth > containerW + 1 && size > MIN) {
            size -= 0.5;
            el.style.fontSize = size + 'px';
        }

        if (el.scrollWidth > containerW + 1) {
            /* Текст очень длинный — разрешаем перенос и ставим минимум */
            el.style.whiteSpace = 'normal';
            el.style.fontSize = MIN + 'px';
        }
    }

    function updatePrintSheet() {
        for (var i = 1; i <= 9; i++) {
            document.getElementById('pz' + i).innerHTML = '';
        }

        var zone = document.getElementById('pz' + (selected + 1));

        var img = document.createElement('img');
        img.className = 'zone-qr-img';
        img.src = QR_SRC;
        img.alt = 'QR';

        var txt = document.createElement('div');
        txt.className = 'zone-text-value';
        txt.textContent = QR_TEXT;

        zone.appendChild(img);
        zone.appendChild(txt);

        /* небольшая задержка чтобы браузер отрисовал и дал реальные offsetWidth */
        setTimeout(function() { fitText(txt); }, 80);
    }

    /* Инициализация */
    selectZone(4);
</script>

</body>
</html>
